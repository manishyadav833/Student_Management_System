<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Student Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">Student Management</a>

        <div>
            <a class="btn btn-outline-light me-2" href="/">Home</a>
            <a class="btn btn-warning me-2" href="/dashboard">Dashboard</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <button class="btn btn-danger">Logout</button>
            </form>
        </div>

    </div>
</nav>
<!-- SEARCH BAR -->
<div class="card shadow p-3 mb-3">

    <form th:action="@{/search}" method="get">

        <div class="row">

            <div class="col-md-10">
                <input class="form-control"
                       name="keyword"
                       placeholder="Search student by name...">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100">Search</button>
            </div>

        </div>

    </form>

</div>

<div class="container mt-4">
    <div class="alert alert-success"
         th:if="${success}"
         th:text="${success}">
    </div>
    <!-- ADD STUDENT FORM -->
    <!-- ADD STUDENT FORM -->
    <div class="card shadow p-4 mb-4">
        <h4>Add Student</h4>

        <form th:action="@{/save}"
              th:object="${student}"
              method="post"
              enctype="multipart/form-data">

            <div class="row">

                <!-- NAME -->
                <div class="col-md-3">
                    <input class="form-control"
                           th:field="*{name}"
                           placeholder="Enter Name">

                    <div class="text-danger small"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">
                    </div>
                </div>

                <!-- EMAIL -->
                <div class="col-md-3">
                    <input class="form-control"
                           th:field="*{email}"
                           placeholder="Enter Email">

                    <div class="text-danger small"
                         th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}">
                    </div>
                </div>

                <!-- COURSE -->
                <div class="col-md-3">
                    <input class="form-control"
                           th:field="*{course}"
                           placeholder="Enter Course">

                    <div class="text-danger small"
                         th:if="${#fields.hasErrors('course')}"
                         th:errors="*{course}">
                    </div>
                </div>

                <!-- IMAGE -->
                <div class="col-md-2">
                    <input class="form-control" type="file" name="image">
                </div>

                <!-- BUTTON -->
                <div class="col-md-1">
                    <button class="btn btn-success w-100">Add</button>
                </div>

            </div>
        </form>

    </div>

    <!-- STUDENT TABLE -->
    <div class="card shadow p-4">
        <h4>Student List</h4>

        <table class="table table-bordered table-striped mt-3">

            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Photo</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="s:${students}">
                <td th:text="${s.id}"></td>

                <td>
                    <img th:src="@{'/images/'+${s.photo}}" width="60">
                </td>

                <td th:text="${s.name}"></td>
                <td th:text="${s.email}"></td>
                <td th:text="${s.course}"></td>

                <td>
                    <a class="btn btn-warning btn-sm"
                       th:href="@{/edit/{id}(id=${s.id})}">Edit</a>

                    <a class="btn btn-danger btn-sm"
                       th:href="@{/delete/{id}(id=${s.id})}"
                       onclick="return confirm('Are you sure you want to delete this student?')">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>

        </table>
    </div>

</div>
</body>
</html>
